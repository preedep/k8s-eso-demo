# Deployment สำหรับ Rust app ที่อ่าน secret ผ่าน env variable
# Secret 'demo-app-secret' ถูกสร้างโดย ESO จาก Azure Key Vault
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eso-demo
  namespace: eso-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eso-demo
  template:
    metadata:
      labels:
        app: eso-demo
    spec:
      containers:
        - name: eso-demo
          image: eso-demo:v2
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-app-secret  # Secret ที่ ESO สร้าง
                  key: db-password
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: demo-app-secret
                  key: api-key
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
      restartPolicy: Always
