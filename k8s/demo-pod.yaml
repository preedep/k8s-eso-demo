# ตัวอย่าง Pod ที่ใช้ Secret ที่ ESO sync มาจาก Azure Key Vault
# ใช้ทดสอบว่า secret mount ได้ถูกต้อง
apiVersion: v1
kind: Pod
metadata:
  name: demo-pod
  namespace: eso-demo
spec:
  containers:
    - name: demo
      image: busybox:1.36
      command: ["sh", "-c", "echo DB_PASSWORD=$DB_PASSWORD && echo API_KEY=$API_KEY && sleep 3600"]
      env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: demo-app-secret   # ชื่อ Secret ที่ ESO สร้าง
              key: db-password
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: demo-app-secret
              key: api-key
  restartPolicy: Never
