# SecretStore: ชี้ไปยัง Azure Key Vault ด้วย Service Principal
# ก่อน apply ต้องรัน scripts/setup-azure-secret.sh ก่อน
# เพื่อสร้าง Secret ชื่อ 'azure-secret-sp' ใน namespace นี้
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: azure-keyvault-store
  namespace: eso-demo
spec:
  provider:
    azurekv:
      authType: ServicePrincipal
      # เปลี่ยน vaultUrl และ tenantId ให้ตรงกับ Azure Key Vault ของคุณ
      vaultUrl: "https://nixakvdev002.vault.azure.net/"
      tenantId: "27e9c8ca-7bf4-43cc-90ed-43d357671a7b"
      authSecretRef:
        clientId:
          name: azure-secret-sp # ชื่อ Kubernetes Secret ที่เก็บ SP credentials
          key: ClientID
        clientSecret:
          name: azure-secret-sp
          key: ClientSecret
