# ExternalSecret: ดึง secret จาก Azure Key Vault แล้วสร้างเป็น Kubernetes Secret
# ESO จะ sync ทุก 1 ชั่วโมง (refreshInterval)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: demo-secret
  namespace: eso-demo
spec:
  refreshInterval: 1h

  # ชี้ไปยัง SecretStore ที่สร้างไว้
  secretStoreRef:
    name: azure-keyvault-store
    kind: SecretStore

  # Kubernetes Secret ที่จะถูกสร้างขึ้น
  target:
    name: demo-app-secret          # ชื่อ Secret ใน Kubernetes
    creationPolicy: Owner          # ESO เป็น owner; ลบ ExternalSecret = ลบ Secret ด้วย

  # รายการ key ที่ต้องการดึงจาก Azure Key Vault
  data:
    - secretKey: db-password       # key ใน Kubernetes Secret
      remoteRef:
        key: demo-db-password      # ชื่อ secret ใน Azure Key Vault

    - secretKey: api-key
      remoteRef:
        key: demo-api-key

  # ถ้าต้องการดึงหลาย key พร้อมกัน ใช้ dataFrom แทน
  # dataFrom:
  #   - extract:
  #       key: demo-app-config     # ชื่อ secret ใน Azure KV (ต้องเป็น JSON)
