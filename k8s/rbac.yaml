apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-demo-sa
  namespace: eso-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
  namespace: eso-demo
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-demo-secret-reader
  namespace: eso-demo
subjects:
  - kind: ServiceAccount
    name: eso-demo-sa
    namespace: eso-demo
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io
