# ExternalSecret: ดึง secret จาก AWS Secrets Manager
# สร้าง K8s Secret ชื่อ 'demo-app-secret' เหมือนกับ Azure
# → Rust app และ Deployment ไม่ต้องเปลี่ยนแปลงเลย (cloud agnostic)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: demo-secret
  namespace: eso-demo
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secretsmanager-store
    kind: SecretStore

  # ชื่อ K8s Secret เดียวกับ Azure เพื่อพิสูจน์ cloud agnostic
  target:
    name: demo-app-secret
    creationPolicy: Owner

  # ดึงแต่ละ secret ที่สร้างใน AWS Secrets Manager
  # (ชื่อ secret ใน AWS ต้องตรงกับ remoteRef.key)
  data:
    - secretKey: db-password         # key ใน K8s Secret
      remoteRef:
        key: demo-db-password        # ชื่อ secret ใน AWS Secrets Manager

    - secretKey: api-key
      remoteRef:
        key: demo-api-key

  # ถ้าเก็บเป็น JSON object secret เดียวใน AWS ให้ใช้ property:
  # data:
  #   - secretKey: db-password
  #     remoteRef:
  #       key: demo-app-secrets      # ชื่อ secret ใน AWS SM
  #       property: db-password      # JSON key ภายใน secret
