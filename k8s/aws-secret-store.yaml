# SecretStore: ชี้ไปยัง AWS Secrets Manager ด้วย Access Key credentials
# ก่อน apply ต้องรัน scripts/setup-aws-secret.sh ก่อน
# เพื่อสร้าง Secret ชื่อ 'aws-secret-credentials' ใน namespace นี้
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager-store
  namespace: eso-demo
spec:
  provider:
    aws:
      service: SecretsManager
      # เปลี่ยน region ให้ตรงกับ AWS region ที่สร้าง secret ไว้
      region: ap-southeast-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-secret-credentials   # ชื่อ Kubernetes Secret ที่เก็บ AWS credentials
            key: access-key-id
          secretAccessKeySecretRef:
            name: aws-secret-credentials
            key: secret-access-key
